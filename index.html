<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
    }
    .container { text-align: center; }
    h1 { margin-bottom: 20px; font-size: 2rem; }
    .status {
      margin-bottom: 20px;
      font-size: 1.3rem;
      min-height: 1.6em;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 6px;
      margin: 0 auto 24px;
      width: fit-content;
    }
    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      font-size: 2.8rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cell:hover { background: #1a2a50; }
    .cell.x { color: #e94560; }
    .cell.o { color: #53d8fb; }
    .cell.win { background: #0f3460; }
    button.reset {
      padding: 10px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.reset:hover { background: #c73650; }
    .score {
      margin-bottom: 18px;
      font-size: 1.1rem;
      display: flex;
      justify-content: center;
      gap: 30px;
    }
    .score span.x { color: #e94560; }
    .score span.o { color: #53d8fb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe</h1>
    <div class="score">
      <span><span class="x">X</span>: <span id="score-x">0</span></span>
      <span>Draws: <span id="score-d">0</span></span>
      <span><span class="o">O</span>: <span id="score-o">0</span></span>
    </div>
    <div class="status" id="status">X's turn</div>
    <div class="board" id="board"></div>
    <button class="reset" onclick="resetGame()">New Game</button>
  </div>

  <script>
    const board = document.getElementById('board');
    const statusEl = document.getElementById('status');
    let cells = Array(9).fill('');
    let current = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, D: 0 };

    const winCombos = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function render() {
      board.innerHTML = '';
      cells.forEach((val, i) => {
        const div = document.createElement('div');
        div.className = 'cell' + (val ? ' ' + val.toLowerCase() : '');
        div.textContent = val;
        div.addEventListener('click', () => handleClick(i));
        board.appendChild(div);
      });
    }

    function handleClick(i) {
      if (cells[i] || gameOver) return;
      cells[i] = current;
      const winner = checkWinner();
      if (winner) {
        gameOver = true;
        statusEl.textContent = winner + ' wins!';
        scores[winner]++;
        updateScores();
        highlightWin(winner);
        return;
      }
      if (cells.every(c => c)) {
        gameOver = true;
        statusEl.textContent = "It's a draw!";
        scores.D++;
        updateScores();
        render();
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      statusEl.textContent = current + "'s turn";
      render();
    }

    function checkWinner() {
      for (const combo of winCombos) {
        const [a, b, c] = combo;
        if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
          return cells[a];
        }
      }
      return null;
    }

    function highlightWin(winner) {
      render();
      for (const combo of winCombos) {
        const [a, b, c] = combo;
        if (cells[a] === winner && cells[b] === winner && cells[c] === winner) {
          const cellEls = board.querySelectorAll('.cell');
          cellEls[a].classList.add('win');
          cellEls[b].classList.add('win');
          cellEls[c].classList.add('win');
        }
      }
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    function resetGame() {
      cells = Array(9).fill('');
      current = 'X';
      gameOver = false;
      statusEl.textContent = "X's turn";
      render();
    }

    render();
  </script>
</body>
</html>
